<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Flashcards: Energy & Technology</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #3498db;
            --bg: #f0f3f5;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; }
        #game-container { width: 90%; max-width: 600px; margin-top: 50px; text-align: center; }
        .card-container { perspective: 1000px; width: 100%; height: 400px; cursor: pointer; position: relative; }
        .card { width: 100%; height: 100%; transition: transform 0.6s; transform-style: preserve-3d; position: relative; }
        .card.flipped { transform: rotateY(180deg); }
        .card-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); background: white; padding: 20px; box-sizing: border-box; border: 4px solid var(--accent); }
        .card-back { transform: rotateY(180deg); background: #ecf0f1; }
        img { width: 100%; max-height: 200px; object-fit: cover; border-radius: 10px; margin-bottom: 15px; }
        h2 { color: var(--primary); margin: 10px 0; font-size: 24px; }
        p { color: #555; font-size: 18px; }
        .controls { margin-top: 30px; display: flex; gap: 20px; justify-content: center; }
        button { padding: 12px 30px; font-size: 18px; cursor: pointer; border: none; border-radius: 50px; background: var(--accent); color: white; transition: 0.3s; }
        button:disabled { background: #bdc3c7; cursor: not-allowed; }
        #registration { display: none; background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        #leaderboard { margin-top: 20px; text-align: left; width: 100%; }
        .progress { margin-bottom: 10px; font-weight: bold; color: var(--primary); }
    </style>
</head>
<body>

<div id="game-container">
    <div class="progress">Tarjeta <span id="current-idx">1</span> de 29</div>
    <div class="card-container" onclick="flipCard()">
        <div class="card" id="main-card">
            <div class="card-face card-front" id="front-content">
                </div>
            <div class="card-face card-back" id="back-content">
                </div>
        </div>
    </div>

    <div class="controls">
        <button id="next-btn" onclick="nextCard()" disabled>Siguiente</button>
    </div>
</div>

<div id="registration">
    <h1 style="color: #e74c3c;">GAME OVER</h1>
    <p>¡Increíble trabajo! Has completado el set de tecnología.</p>
    <input type="text" id="player-name" placeholder="Tu nombre aquí" style="padding: 10px; font-size: 16px; width: 80%;">
    <br><br>
    <button onclick="savePlayer()">INGRESA TU NOMBRE</button>
    <div id="leaderboard">
        <h3>Lista de Participantes:</h3>
        <ul id="player-list"></ul>
    </div>
</div>

<script>
const vocabulary = [
    {en: "Overview on the application", es: "Visión general de la aplicación", img: "https://images.unsplash.com/photo-1510915361894-db8b60106cb1?auto=format&fit=crop&w=500&q=80"},
    {en: "Methanol", es: "Metanol", img: "https://images.unsplash.com/photo-1532187863486-abf9d3445661?auto=format&fit=crop&w=500&q=80"},
    {en: "Fuel cell", es: "Celda de combustible", img: "https://images.unsplash.com/photo-1558489580-faa74691fdc5?auto=format&fit=crop&w=500&q=80"},
    {en: "Portable electronic devices (DMFC)", es: "Dispositivos electrónicos portátiles (DMFC)", img: "https://images.unsplash.com/photo-1525547719571-a2d4ac8945e2?auto=format&fit=crop&w=500&q=80"},
    {en: "Technologically advanced human societies", es: "Sociedades humanas tecnológicamente avanzadas", img: "https://images.unsplash.com/photo-1451187580459-43490279c0fa?auto=format&fit=crop&w=500&q=80"},
    {en: "Require specialized tools and equipment", es: "Requerir herramientas y equipos especializados", present: "Societies require high tech equipment. (Las sociedades requieren equipo de alta tecnología)", past: "They required new tools last year. (Ellos requirieron nuevas herramientas el año pasado)", img: "https://images.unsplash.com/photo-1581091226825-a6a2a5aee158?auto=format&fit=crop&w=500&q=80"},
    {en: "To enable their diverse and mobile activities", es: "Para permitir sus diversas actividades móviles", present: "Engines enable fast travel. (Los motores permiten viajes rápidos)", past: "The tool enabled the work. (La herramienta permitió el trabajo)", img: "https://images.unsplash.com/photo-1512428559087-560fa5ceab42?auto=format&fit=crop&w=500&q=80"},
    {en: "Laptops, PDAs, handphones, etc.", es: "Laptops, agendas electrónicas, celulares, etc.", img: "https://images.unsplash.com/photo-1519389950473-47ba0277781c?auto=format&fit=crop&w=500&q=80"},
    {en: "An essential tool for many people", es: "Una herramienta esencial para muchas personas", img: "https://images.unsplash.com/photo-1499951360447-b19be8fe80f5?auto=format&fit=crop&w=500&q=80"},
    {en: "In their daily lives", es: "En sus vidas diarias", img: "https://images.unsplash.com/photo-1506126613408-eca07ce68773?auto=format&fit=crop&w=500&q=80"},
    {en: "Rechargeable batteries used to power...", es: "Baterías recargables usadas para alimentar...", img: "https://images.unsplash.com/photo-1619642751034-765dfdf7c58e?auto=format&fit=crop&w=500&q=80"},
    {en: "Could be improved with regards to...", es: "Podría ser mejorado con respecto a...", img: "https://images.unsplash.com/photo-1581092918056-0c4c3acd3789?auto=format&fit=crop&w=500&q=80"},
    {en: "Power density", es: "Densidad de potencia", img: "https://images.unsplash.com/photo-1473341304170-971dccb5ac1e?auto=format&fit=crop&w=500&q=80"},
    {en: "Crucial need for efficient, renewable and more environmentally friendly power sources", es: "Necesidad crucial de fuentes de energía eficientes, renovables y más amigables con el ambiente", img: "https://images.unsplash.com/photo-1466611653911-95281773ad90?auto=format&fit=crop&w=500&q=80"},
    {en: "Many researches have shown that...", es: "Muchas investigaciones han mostrado que...", present: "Studies show great results. (Los estudios muestran grandes resultados)", past: "The test showed the truth. (La prueba mostró la verdad)", img: "https://images.unsplash.com/photo-1454165833767-027ffea9e77b?auto=format&fit=crop&w=500&q=80"},
    {en: "Direct methanol fuel cell (DMFC)", es: "Celda de combustible de metanol directo (DMFC)", img: "https://images.unsplash.com/photo-1581092160562-40aa08e78837?auto=format&fit=crop&w=500&q=80"},
    {en: "An appropriate alternative to...", es: "Una alternativa apropiada para...", img: "https://images.unsplash.com/photo-1506794778202-cad84cf45f1d?auto=format&fit=crop&w=500&q=80"},
    {en: "Rechargeable battery technology", es: "Tecnología de baterías recargables", img: "https://images.unsplash.com/photo-1593941707882-a5bba14938c7?auto=format&fit=crop&w=500&q=80"},
    {en: "Many factors must be resolved", es: "Muchos factores deben ser resueltos", present: "They resolve the issue. (Ellos resuelven el problema)", past: "Scientists resolved the bug. (Los científicos resolvieron el error)", img: "https://images.unsplash.com/photo-1507413245164-6160d8298b31?auto=format&fit=crop&w=500&q=80"},
    {en: "Before it can be commercialized", es: "Antes de que pueda ser comercializado", img: "https://images.unsplash.com/photo-1542601906990-b4d3fb778b09?auto=format&fit=crop&w=500&q=80"},
    {en: "This paper gives an overview on...", es: "Este documento da una visión general sobre...", present: "The book gives info. (El libro da información)", past: "She gave a lecture. (Ella dio una conferencia)", img: "https://images.unsplash.com/photo-1450101499163-c8848c66ca85?auto=format&fit=crop&w=500&q=80"},
    {en: "Possibilities for using the DMFC as...", es: "Posibilidades para usar el DMFC como...", img: "https://images.unsplash.com/photo-1485827404703-89b55fcc595e?auto=format&fit=crop&w=500&q=80"},
    {en: "Power source", es: "Fuente de poder", img: "https://images.unsplash.com/photo-1513828583688-c52646db42da?auto=format&fit=crop&w=500&q=80"},
    {en: "Along with some views on...", es: "Junto con algunas opiniones sobre...", img: "https://images.unsplash.com/photo-1494790108377-be9c29b29330?auto=format&fit=crop&w=500&q=80"},
    {en: "Current and future trends", es: "Tendencias actuales y futuras", img: "https://images.unsplash.com/photo-1504868584819-f8e905263543?auto=format&fit=crop&w=500&q=80"},
    {en: "DMFC development", es: "Desarrollo del DMFC", img: "https://images.unsplash.com/photo-1460925895917-afdab827c52f?auto=format&fit=crop&w=500&q=80"},
    {en: "Economic analysis", es: "Análisis económico", img: "https://images.unsplash.com/photo-1460925895917-afdab827c52f?auto=format&fit=crop&w=500&q=80"},
    {en: "Presents the current problems and solutions", es: "Presenta los problemas y soluciones actuales", present: "He presents the plan. (Él presenta el plan)", past: "We presented the data. (Presentamos los datos)", img: "https://images.unsplash.com/photo-1552664730-d307ca884978?auto=format&fit=crop&w=500&q=80"},
    {en: "Encourage students to use this knowledge", es: "Alentar a los estudiantes a usar este conocimiento", present: "Teachers encourage kids. (Los profes alientan a los chicos)", past: "Mom encouraged me. (Mi mamá me alentó)", img: "https://images.unsplash.com/photo-1522202176988-66273c2fd55f?auto=format&fit=crop&w=500&q=80"},
    {en: "To help them understand the text", es: "Para ayudarlos a entender el texto", present: "I understand English. (Yo entiendo inglés)", past: "He understood the lesson. (Él entendió la lección)", img: "https://images.unsplash.com/photo-1456513080510-7bf3a84b82f8?auto=format&fit=crop&w=500&q=80"}
];

let currentIndex = 0;
let isFlipped = false;

function speak(text, lang) {
    const utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = lang;
    utterance.rate = 0.9;
    window.speechSynthesis.speak(utterance);
}

function updateCard() {
    const data = vocabulary[currentIndex];
    const front = document.getElementById('front-content');
    const back = document.getElementById('back-content');
    
    front.innerHTML = `
        <img src="${data.img}" alt="Image">
        <h2>${data.en}</h2>
        ${data.present ? `<p style="font-size:14px"><b>Present:</b> ${data.present.split('(')[0]}</p>` : ''}
        ${data.past ? `<p style="font-size:14px"><b>Past:</b> ${data.past.split('(')[0]}</p>` : ''}
    `;
    
    back.innerHTML = `
        <h2 style="color: #2980b9;">${data.es}</h2>
        ${data.present ? `<p style="font-size:14px">${data.present.split('(')[1].replace(')', '')}</p>` : ''}
        ${data.past ? `<p style="font-size:14px">${data.past.split('(')[1].replace(')', '')}</p>` : ''}
        <p style="font-size: 12px; color: #7f8c8d;">¡Excelente pronunciación!</p>
    `;

    document.getElementById('current-idx').innerText = currentIndex + 1;
}

function flipCard() {
    const card = document.getElementById('main-card');
    card.classList.toggle('flipped');
    isFlipped = !isFlipped;
    
    const data = vocabulary[currentIndex];
    
    if (isFlipped) {
        confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
        speak(data.es, 'es-MX');
        document.getElementById('next-btn').disabled = false;
    } else {
        speak(data.en, 'en-US');
    }
}

function nextCard() {
    if (currentIndex < vocabulary.length - 1) {
        currentIndex++;
        isFlipped = false;
        document.getElementById('main-card').classList.remove('flipped');
        document.getElementById('next-btn').disabled = true;
        updateCard();
        // Speak initial English on new card
        setTimeout(() => speak(vocabulary[currentIndex].en, 'en-US'), 500);
    } else {
        document.getElementById('game-container').style.display = 'none';
        document.getElementById('registration').style.display = 'block';
        showLeaderboard();
    }
}

function savePlayer() {
    const name = document.getElementById('player-name').value;
    if (name) {
        let players = JSON.parse(localStorage.getItem('flashcard_players') || '[]');
        players.push(name);
        localStorage.setItem('flashcard_players', JSON.stringify(players));
        document.getElementById('player-name').value = '';
        showLeaderboard();
        alert("¡Registro guardado con éxito!");
    }
}

function showLeaderboard() {
    const list = document.getElementById('player-list');
    const players = JSON.parse(localStorage.getItem('flashcard_players') || '[]');
    list.innerHTML = players.map(p => `<li>${p} - ¡Completado!</li>`).join('');
}

// Inicialización
updateCard();
setTimeout(() => speak(vocabulary[0].en, 'en-US'), 1000);
</script>
</body>
</html>
